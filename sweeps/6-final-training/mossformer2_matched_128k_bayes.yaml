# MossFormer2 (SepFormer-matched ~26.4M) 128k Bayesian HPO — final-training refinement.
#
# Budget-constrained: ~3.4 h/epoch at 128k (vs ~1.5 h for SepFormer), so this
# sweep is deliberately smaller than sepformer_128k_bayes.yaml:
# - 4D search space (lr, grad_clip, wd, dropout).
# - Hyperband min 4 / max 8 epochs (eta=2): losers stopped after ~14 h,
#   survivors run ~27 h. Run with `wandb agent --count 8` → ~150-160 GPU-hours.
# - 64k run q3hzv58q shows clean rank separation by epoch 4-8; bad LRs in the
#   SepFormer sweep were already last by epoch 4.
#
# Range rationale:
# - lr: log-centered (geom. mean ≈ 2.7e-4) on the proven baseline 3e-4, stable
#   at 16k/32k/64k. Floor near the SepFormer winner zone (1.3-1.7e-4); >5e-4
#   diverged historically (different model, kept as soft prior).
# - weight_decay: SepFormer 128k winners all ~1e-7 (= off). Ceiling 2e-5 to
#   verify "wd off" transfers to MossFormer2.
# - grad_clip: baseline 5.0 vs SepFormer winners 2.0-2.4.
# - dropout → mossformer2.attn_dropout (exposed from the vendored code, which
#   hard-coded 0.1 — all scaling runs trained at 0.1). SepFormer winners used
#   0.045-0.08; ceiling 0.15 mirrors the SepFormer search.
#
# After the sweep: take top config by val_si_sdri (avg over all 8 MM-IPC
# variants), pin into experiments/mossformer2/6-final-training/128k_matched_final.yaml,
# train ≥80 epochs / patience 10 / full val in polsess-separation-128k.

program: train_sweep.py
method: bayes
metric:
  name: val_si_sdri
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 4
  max_iter: 8
  eta: 2

parameters:
  # ---- Fixed ----
  config:
    value: experiments/mossformer2/6-final-training/128k_matched_sweep_base.yaml

  seed:
    value: 42

  # ---- Search space ----

  # 3e-4 = MossFormer2 baseline (stable at 16k/32k/64k); SepFormer winners ~1.5e-4.
  lr:
    distribution: log_uniform_values
    min: 1.2e-4
    max: 6.0e-4

  # Baseline 5.0; SepFormer 128k winners 2.0-2.4.
  grad_clip_norm:
    distribution: log_uniform_values
    min: 1.5
    max: 5.0

  # Baseline 0.0; SepFormer 128k winners ~1e-7 (effectively off).
  weight_decay:
    distribution: log_uniform_values
    min: 1.0e-7
    max: 2.0e-5

  # Routed to mossformer2.attn_dropout; 0.1 = upstream hard-coded value used in
  # all scaling runs. SepFormer 128k winners: 0.045-0.08.
  dropout:
    distribution: uniform
    min: 0.0
    max: 0.15

project: polsess-thesis-experiments
name: mossformer2-matched-final-128k
