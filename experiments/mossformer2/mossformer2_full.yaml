# MossFormer2 configuration for PolSESS — paper-faithful full size (~55.7M params).
# Based on "MossFormer2: Combining Transformer and RNN-Free Recurrent Network
# for Enhanced Time-Domain Monaural Speech Separation" (Zhao et al. 2023,
# arXiv:2312.11825). Vendored from ClearerVoice-Studio (see models/mossformer2/).
#
# This is the paper's full configuration: 24 GFSMN blocks at feature dim 512
# (~55.7M params — by far the largest model in this lineup). It is memory-heavy:
# batch_size is 1 with gradient accumulation to recover an effective batch of 2.

data:
  dataset_type: polsess
  batch_size: 1  # 55M model — one mixture per step
  num_workers: 1
  prefetch_factor: 2
  task: SB  # Speaker separation
  train_max_samples: 16000  # Initial validation subset (full-scale runs deferred)
  val_max_samples: null

model:
  model_type: mossformer2
  mossformer2:
    N: 512           # Encoder feature dim = transformer/GFSMN working dim
    kernel_size: 16  # Encoder kernel (decoder stride = kernel_size // 2 = 8)
    C: 2             # Number of speakers
    num_blocks: 24   # GFSMN depth — paper-faithful

training:
  lr: 0.00015
  weight_decay: 0.0
  grad_clip_norm: 5.0
  lr_factor: 0.5
  lr_patience: 2
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  wandb_run_name: mossformer2-full
  log_file: null
  log_level: INFO
  resume_from: null

  validation_variants: ["SER", "SE"]

  # Curriculum learning schedule (mirrors the SepFormer baseline)
  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
