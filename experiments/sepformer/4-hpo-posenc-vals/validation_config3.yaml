# SepFormer Posenc HPO Validation — Config 3
# Source: upbeat-sweep-8 (qmcjy4qn), best_val_sisdr=6.018
# Sweep: sepformer-posenc (0r4w3ep2)

data:
  dataset_type: polsess
  batch_size: 2
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null

model:
  model_type: sepformer
  sepformer:
    N: 256
    kernel_size: 16
    stride: 8
    C: 2
    causal: false
    num_blocks: 2
    num_layers: 8
    d_model: 256
    nhead: 8
    d_ffn: 1024
    dropout: 0.11366985353000024
    chunk_size: 200
    hop_size: 100
    use_positional_encoding: true

training:
  seed: 42
  lr: 0.00019016939089258644
  weight_decay: 1.2737063929285245e-05
  grad_clip_norm: 3.6360168317916624
  lr_factor: 0.37872332545856185
  lr_patience: 3
  num_epochs: 80
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  save_all_checkpoints: false
  early_stopping_patience: 15

  use_wandb: true
  wandb_project: polsess-separation
  log_level: INFO

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
