# SepFormer-Medium: mid-size architecture between Small (2.2M) and Original (25.7M)
# 8.5M params — similar to ConvTasNet, tests whether SepFormer benefits from
# more capacity than Small without the full Original's overfitting
# LR=0.001 with batch_size=8 (validated in SepFormer-Small run 2)

data:
  dataset_type: polsess
  batch_size: 4
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null
  val_max_samples: null

model:
  model_type: sepformer
  sepformer:
    N: 192          # Encoder channels (Small=128, Original=256)
    kernel_size: 16
    stride: 8
    C: 2
    causal: false
    num_blocks: 2
    num_layers: 6   # Transformer layers (Small=4, Original=8)
    d_model: 192    # Transformer dimension (Small=128, Original=256)
    nhead: 4        # Attention heads (d_model/nhead=48)
    d_ffn: 512      # Feed-forward dimension (Small=256, Original=1024)
    dropout: 0.1    # Regularization against overfitting
    chunk_size: 250
    hop_size: 125

training:
  lr: 0.0005
  weight_decay: 7.02e-6
  grad_clip_norm: 4.87
  lr_factor: 0.912
  lr_patience: 3
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  wandb_run_name: null
  log_file: null
  log_level: INFO
  resume_from: null

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["C", "R"]
    - epoch: 3
      variants: ["C", "R", "SR", "S"]
    - epoch: 5
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
