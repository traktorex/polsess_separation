# SepFormer HPO with Positional Encoding — Full 16K dataset, 60 epochs
# Single-stage sweep: no curriculum learning, all variants from epoch 1.
# Architecture: standard SepFormer (~25.7M params) with positional encoding.

data:
  dataset_type: polsess
  batch_size: 2
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null  # Full dataset (~16K)

model:
  model_type: sepformer
  sepformer:
    N: 256
    kernel_size: 16
    stride: 8
    C: 2
    causal: false
    num_blocks: 2
    num_layers: 8
    d_model: 256
    nhead: 8
    d_ffn: 1024
    dropout: 0.0
    chunk_size: 250
    hop_size: 125
    use_positional_encoding: true

training:
  lr: 0.00015
  weight_decay: 0.0
  grad_clip_norm: 5.0
  lr_factor: 0.5
  lr_patience: 2
  num_epochs: 60
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  save_all_checkpoints: false
  early_stopping_patience: 8

  use_wandb: true
  wandb_project: polsess-thesis-experiments
  log_level: INFO

  validation_variants: ["SER", "SE"]

  # No curriculum — train on all variants from epoch 1
  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
