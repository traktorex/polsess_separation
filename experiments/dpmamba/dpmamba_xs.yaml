# DPMamba XS (Extra Small) — ~2.3M params
# Based on: Jiang et al. 2024 (arXiv 2403.18257, Table 2)

data:
  dataset_type: polsess
  batch_size: 4
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null
  val_max_samples: null

model:
  model_type: dpmamba
  dpmamba:
    N: 128          # Encoder channels (paper XS)
    kernel_size: 16
    stride: 8
    C: 2
    num_layers: 8   # Paper XS: 8 dual-path layers
    chunk_size: 250
    n_mamba_dp: 2   # BiMamba blocks per intra/inter path (author default)
    d_state: 16
    d_conv: 4
    expand: 2

training:
  lr: 0.0006
  weight_decay: 0.0
  grad_clip_norm: 5.0
  lr_factor: 0.5
  lr_patience: 2
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  wandb_run_name: dpmamba-xs
  log_file: null
  log_level: INFO
  resume_from: null

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["C", "R"]
    - epoch: 3
      variants: ["C", "R", "SR", "S"]
    - epoch: 5
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
