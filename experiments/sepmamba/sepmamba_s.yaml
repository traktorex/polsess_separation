# SepMamba S (Small) — ~7.2M params
# Based on: Schin et al. 2024 (arXiv 2410.20997, Table 1)

data:
  dataset_type: polsess
  batch_size: 4
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null
  val_max_samples: null

model:
  model_type: sepmamba
  sepmamba:
    C: 2
    dim: 64         # Base channel dim (paper S)
    n_stages: 3     # U-Net depth: 64 → 128 → 256
    n_mamba: 8      # BiMamba blocks per stage (paper S)
    kernel_size: 16
    d_state: 16
    d_conv: 4
    expand: 2

training:
  lr: 0.00015
  weight_decay: 0.0
  grad_clip_norm: 5.0
  lr_factor: 0.5
  lr_patience: 2
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  wandb_run_name: sepmamba-s
  log_file: null
  log_level: INFO
  resume_from: null

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["C", "R"]
    - epoch: 3
      variants: ["C", "R", "SR", "S"]
    - epoch: 5
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
