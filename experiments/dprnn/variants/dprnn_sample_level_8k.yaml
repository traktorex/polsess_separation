# DPRNN sample-level encoder (kernel_size=2) — 8K subset for sweep
# Based on DPRNN paper's best config (frame length 2, stride 1)
# Batch size 2 due to 8x longer encoded sequences causing OOM at higher values

data:
  dataset_type: polsess
  batch_size: 2
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: 8000

model:
  model_type: dprnn
  dprnn:
    N: 64
    kernel_size: 2
    stride: 1
    C: 2
    num_layers: 6
    chunk_size: 250
    rnn_type: LSTM
    hidden_size: 128
    num_rnn_layers: 1
    dropout: 0.0
    bidirectional: true
    norm_type: ln

training:
  lr: 0.00015
  weight_decay: 2.1e-5
  grad_clip_norm: 2.76
  lr_factor: 0.863
  lr_patience: 3
  num_epochs: 100
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  save_all_checkpoints: false
  early_stopping_patience: 15

  use_wandb: true
  wandb_project: polsess-separation
  log_level: INFO

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["C", "R"]
    - epoch: 3
      variants: ["C", "R", "SR", "S"]
    - epoch: 8
      variants: ["R", "SR", "S", "SE", "ER", "E", "SER"]
      lr_scheduler: start
