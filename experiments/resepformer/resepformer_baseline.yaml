# RE-SepFormer baseline configuration for PolSESS
# Based on "Resource-Efficient Separation Transformer" (Subakan et al. 2022)
# Architecture/params follow SpeechBrain's resepformer.yaml recipe (the efficient
# data point). The data + training blocks are kept identical to the SepFormer
# positional-encoding baseline so the comparison is apples-to-apples.

data:
  dataset_type: polsess
  batch_size: 8  # Transformers use more memory
  num_workers: 1
  prefetch_factor: 1
  task: SB  # Speaker separation
  train_max_samples: 16000
  val_max_samples: null

model:
  model_type: resepformer
  resepformer:
    N: 128          # Encoder channels (also transformer d_model)
    kernel_size: 16
    stride: 8
    C: 2            # Number of speakers
    causal: false
    num_blocks: 2   # Resource-efficient separation blocks
    num_layers: 8   # Transformer layers in both intra (seg) and inter (mem) blocks
    nhead: 8        # Attention heads
    d_ffn: 1024     # Feed-forward dimension
    dropout: 0.0
    segment_size: 150  # Non-overlapping chunk size
    use_positional_encoding: True

training:
  lr: 0.0006
  weight_decay: 0.0
  grad_clip_norm: 5.0
  lr_factor: 0.5
  lr_patience: 2
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  wandb_run_name: resepformer-baseline
  log_file: null
  log_level: INFO
  resume_from: null

  validation_variants: ["SER", "SE"]

  # Curriculum learning schedule
  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
