# MambaTasNet-XS HPO Validation — Config 3
# Source: rural-sweep-5 (vla7rqbu), best_val_sisdr=4.047
# Sweep: mamba-tasnet-xs (gbyurf31)

data:
  dataset_type: polsess
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  task: SB
  train_max_samples: 16000

model:
  model_type: mamba_tasnet
  mamba_tasnet:
    N: 128
    kernel_size: 16
    stride: 8
    C: 2
    bot_dim: 128
    n_mamba: 16
    d_state: 16
    d_conv: 4
    expand: 2

training:
  seed: 42
  lr: 0.0020350200271264597
  weight_decay: 1.1301271199230434e-06
  grad_clip_norm: 4.320993362029199
  lr_factor: 0.5958465392324626
  lr_patience: 4
  num_epochs: 80
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  save_all_checkpoints: false
  early_stopping_patience: 15

  use_wandb: true
  wandb_project: polsess-separation
  log_level: INFO

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
