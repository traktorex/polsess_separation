# MambaTasNet-XS HPO Validation — Config 2
# Source: valiant-sweep-23 (onlq1g17), best_val_sisdr=4.062
# Sweep: mamba-tasnet-xs (gbyurf31)

data:
  dataset_type: polsess
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  task: SB
  train_max_samples: 16000

model:
  model_type: mamba_tasnet
  mamba_tasnet:
    N: 128
    kernel_size: 16
    stride: 8
    C: 2
    bot_dim: 128
    n_mamba: 16
    d_state: 16
    d_conv: 4
    expand: 2

training:
  seed: 42
  lr: 0.0024069854913310765
  weight_decay: 1.3103995304483037e-05
  grad_clip_norm: 1.7189680744926816
  lr_factor: 0.6304856608188854
  lr_patience: 2
  num_epochs: 80
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  save_all_checkpoints: false
  early_stopping_patience: 15

  use_wandb: true
  wandb_project: polsess-separation
  log_level: INFO

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["C", "R"]
    - epoch: 3
      variants: ["C", "R", "SR", "S"]
    - epoch: 5
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
