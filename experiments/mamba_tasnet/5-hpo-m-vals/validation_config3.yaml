# MambaTasNet-M HPO Validation — Config 3
# Source: treasured-sweep-16 (ctr0hpan), best_val_sisdr=4.52559814453125
# Sweep: mamba-tasnet-m (6t8qrgut)

data:
  dataset_type: polsess
  batch_size: 4
  num_workers: 1
  prefetch_factor: 2
  task: SB
  train_max_samples: null
  val_max_samples: null

model:
  model_type: mamba_tasnet
  mamba_tasnet:
    N: 256          # Encoder channels (paper M)
    kernel_size: 16
    stride: 8
    C: 2
    bot_dim: 256    # Bottleneck matches N (paper M)
    n_mamba: 32     # Paper M: 32 BiMamba blocks (Speech Slytherin Table 1)
    d_state: 16
    d_conv: 4
    expand: 2
    residual_in_fp32: true

training:
  lr: 0.000581372921869946
  weight_decay: 1.882585059614174e-06
  grad_clip_norm: 4.188791879703563
  lr_factor: 0.6531901676950733
  lr_patience: 2
  num_epochs: 200
  use_amp: true
  amp_eps: 0.0001
  save_dir: checkpoints
  use_wandb: true
  wandb_project: polsess-separation
  wandb_entity: null
  log_file: null
  log_level: INFO
  resume_from: null
  early_stopping_patience: 10

  validation_variants: ["SER", "SE"]

  curriculum_learning:
    - epoch: 1
      variants: ["R", "S", "SR", "E", "ER", "SE", "SER"]
      lr_scheduler: start
