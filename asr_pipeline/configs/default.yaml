# Default pipeline config — POC-equivalent values.
# Loaded by `asr_pipeline.config.load_pipeline_config_from_yaml()`.

sample_rate: 16000
device: cuda

# Force deterministic cuDNN algorithms so runs are reproducible. The enhancement
# stage is otherwise the pipeline's sole source of run-to-run float
# nondeterminism (which WhisperX can amplify into a flipped token). Set false to
# restore cuDNN autotuning (slightly faster, non-reproducible).
deterministic: true

# Disable to keep the run purely in-memory (interactive use).
spill_intermediate: false
artifact_dir: null

diarization:
  enabled: true
  model_id: pyannote/speaker-diarization-3.1
  # hf_token is read from the $HF_TOKEN env var by default. Do NOT
  # hardcode a real token here — it ends up in git history.
  num_speakers: 2

routing:
  enabled: true
  min_overlap_dur: 0.20      # drop overlaps shorter than this
  merge_gap: 0.50            # merge overlap regions closer than this

enhancement:
  enabled: true
  checkpoint_path: /home/user/MP-SENet/best_ckpt/g_best_vb
  config_path: /home/user/MP-SENet/config.json
  max_segment_length_s: 8.0   # solos longer than this get Hann overlap-add chunked

separation:
  enabled: true
  checkpoint_path: checkpoints/sepformer/SB/128_run/sepformer_SB_best_128k_e41.pt
  separator_sample_rate: 8000
  training_chunk_length_s: 4.0
  context_window_mode: expand_to_chunk
  context_pad_seconds: 1.0
  min_fragment_length_s: 4.0              # floor for total padded-window length
  seam_mode: snap_to_silence              # zero_crossing | overlap_boundary | snap_to_silence
  seam_search_radius_s: 0.05              # zero-crossing nudge radius
  snap_silence_max_extend_s: 0.3          # snap_to_silence: max outward extension
  overlap_add_threshold_s: 12.0
  volume_normalization: sum_equals_mix
  vad_threshold: 0.25                  # upper threshold ("definitely speech")
  vad_soft_threshold: 0.10             # Schmitt-trigger lower threshold (0 to disable)
  vad_attack_frames: 1                 # frames of dilation at speech onset (32 ms each)
  vad_release_frames: 1                # frames of dilation at speech offset

post_separation_processing:
  # VAD mask application + optional bandwidth extension. Always-on:
  # Stage 4 depends on the masked `_gated` arrays this stage writes,
  # so there's no `enabled` knob. Set `backend: naive` to apply only
  # the mask (no neural BWE).
  backend: ap_bwe                       # naive | ap_bwe | flowhigh
  # PyTorch .pt files are zip archives — point at the file itself, NOT at
  # the extracted directory. Both `g_8kto16k` and `g_8kto16k.zip` work
  # (extension is ignored by torch.load).
  checkpoint_path: /home/user/AP-BWE/checkpoints/8kto16k/g_8kto16k.zip
  # FlowHigh-only knob: input SR fed to FlowHighSR.generate(). README
  # examples use 12k/16k; the docs say "any rate < 48 kHz".  Default
  # 16000 = pipeline rate, no resample on the way in. Ignored unless
  # `backend: flowhigh`.
  flowhigh_input_sr: 16000

assembly:
  enabled: true
  min_solo_for_anchor_s: 3.0
  anchor_max_duration_s: 30.0             # cap solo audio fed to ECAPA for the anchor
  output_mode: shortened
  silence_separator_s: 0.3
  crossfade_ms: 5.0                       # internal piece-to-piece seam fade
  edge_fade_ms: 2.0                       # stream's outermost edge fade
  overlap_rms_match_solo: true            # scale overlap pieces to solo RMS
  per_piece_rms_norm: false               # aggressive: normalise ALL pieces
  target_rms: null

transcription:
  enabled: true
  # backend selector. See class docstring in stages/transcription.py.
  #   whisper  = openai-whisper (canonical OpenAI checkpoints only;
  #              heuristic word timestamps, drift 200-500 ms).
  #   whisperx = faster-whisper + wav2vec2 forced alignment. Accepts HF
  #              model ids (auto-converted to CT2 on first use under
  #              ~/models/ct2-whisper/<safe-name>/). Word timestamps to
  #              ±50 ms.
  backend: whisperx
  # OpenAI short name (large-v3 / large-v2 / ...) when backend=whisper.
  # OpenAI short name OR HF Whisper id when backend=whisperx.
  model_name: large-v2
  language: pl
  initial_prompt: Rozmowa po polsku.
  word_timestamps: true
  # wav2vec2 forced-alignment model. ONLY used by backend=whisperx.
  align_model_name: jonatasgrosman/wav2vec2-large-xlsr-53-polish
  # Rationale for choosing (backend, model_name): see configs/README.md
  # (5-variant comparison, 2026-05-25 / -26).
